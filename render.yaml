# render.yaml - Blueprint for Render.com

services:
  # Main API Service
  - type: web
    name: viral-api
    runtime: python
    repo: https://github.com/Abbah77/Viral-B
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: AI_SERVICE_ENABLED
        value: "true"
      - key: REDIS_URL
        fromService:
          type: redis
          name: viral-redis
          property: connectionString

  # Redis Cache (Required for AI)
  - type: redis
    name: viral-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []  # Allow all internal connections

  # Optional: Background worker for AI signal processing
  - type: worker
    name: viral-ai-worker
    runtime: python
    repo: https://github.com/YOUR_USERNAME/YOUR_REPO
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "import asyncio; from ai import main; asyncio.run(main())"
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: viral-redis
          property: connectionString
